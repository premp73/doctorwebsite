
<!-- ================= HERO ================= -->

<section class="contact-hero">

  <div class="container text-center">

    <h1>Contact Us</h1>

    <p>We are here to help you 24/7</p>

  </div>

</section>

<!-- ================= INFO CARDS ================= -->

<section class="contact-info">

  <div class="container">

    <div class="row text-center">

      <div class="col-lg-4 mb-4">

        <div class="info-card">

          <i class="fas fa-phone"></i>

          <h4>Call Us</h4>

          <p>+91 98765 43210</p>

        </div>

      </div>

      <div class="col-lg-4 mb-4">

        <div class="info-card">

          <i class="fas fa-envelope"></i>

          <h4>Email</h4>

          <p>info@doctorcare.com</p>

        </div>

      </div>

      <div class="col-lg-4 mb-4">

        <div class="info-card">

          <i class="fas fa-location-dot"></i>

          <h4>Address</h4>

          <p>New Delhi, India</p>

        </div>

      </div>

    </div>

  </div>

</section>

<!-- ================= MAP ================= -->

<section class="map-section">

  <div class="container">

    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14016.845!2d77.2090!3d28.6139"
      width="100%"
      height="350"
      style="border:0;"
      allowfullscreen=""
      loading="lazy">

    </iframe>

  </div>

</section>

<!-- ================= CONTACT FORM ================= -->

<section class="contact-form-section">

  <div class="container">

    <div class="row justify-content-center">

      <div class="col-lg-8">

        <form [formGroup]="contactForm"
              (ngSubmit)="onSubmit()"
              class="contact-form">

          <div class="row">

            <div class="col-md-6 mb-3">

              <input type="text"
                     class="form-control"
                     placeholder="Your Name"
                     formControlName="name">

              <small *ngIf="submitted && f['name'].errors"
                     class="text-danger">
                Name is required
              </small>

            </div>

            <div class="col-md-6 mb-3">

              <input type="email"
                     class="form-control"
                     placeholder="Your Email"
                     formControlName="email">

              <small *ngIf="submitted && f['email'].errors"
                     class="text-danger">
                Valid email required
              </small>

            </div>

            <div class="col-md-6 mb-3">

              <input type="text"
                     class="form-control"
                     placeholder="Phone Number"
                     formControlName="phone">

            </div>

            <div class="col-md-6 mb-3">

              <input type="text"
                     class="form-control"
                     placeholder="Subject"
                     formControlName="subject">

            </div>

            <div class="col-md-12 mb-3">

              <textarea rows="5"
                        class="form-control"
                        placeholder="Your Message"
                        formControlName="message">
              </textarea>

            </div>

            <div class="col-md-12 text-center">

              <button class="btn btn-primary btn-lg">
                Send Message
              </button>

            </div>

          </div>

        </form>

      </div>

    </div>

  </div>

</section>
