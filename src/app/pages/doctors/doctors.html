
<!-- ================= HERO ================= -->

<section class="doctor-hero">

  <div class="container text-center">

    <h1>Our Expert Doctors</h1>

    <p>Meet our experienced and certified medical specialists</p>

  </div>

</section>

<!-- ================= SEARCH & FILTER ================= -->

<section class="doctor-filter">

  <div class="container">

    <div class="row mb-4">

      <div class="col-lg-6 mb-2">

        <input
          type="text"
          class="form-control"
          placeholder="Search doctor by name..."
          [(ngModel)]="searchText">

      </div>

      <div class="col-lg-6 mb-2">

        <select class="form-control" [(ngModel)]="selectedDept">

          <option *ngFor="let d of departments" [value]="d">
            {{d}}
          </option>

        </select>

      </div>

    </div>

  </div>

</section>

<!-- ================= DOCTOR LIST ================= -->

<section class="doctor-list">

  <div class="container">

    <div class="row">

      <div class="col-lg-3 col-md-6 mb-4"
           *ngFor="let doc of filteredDoctors">

        <div class="doctor-card">

          <img [src]="doc.image" />

          <h4>{{doc.name}}</h4>

          <p>{{doc.speciality}}</p>

          <span>{{doc.experience}}</span>

          <a routerLink="/appointment" class="btn btn-primary mt-3">
            Book Appointment
          </a>

        </div>

      </div>

    </div>

  </div>

</section>
