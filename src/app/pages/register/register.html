
<section class="register-section">

  <div class="container">

    <div class="row justify-content-center">

      <div class="col-lg-6">

        <div class="register-card">

          <h2>Create Account</h2>

          <p>Join DoctorCare and book appointments easily</p>

          <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

            <!-- Name -->
            <div class="mb-3">

              <input type="text"
                     class="form-control"
                     placeholder="Full Name"
                     formControlName="name">

              <small *ngIf="submitted && f['name'].errors"
                     class="text-danger">
                Name is required
              </small>

            </div>

            <!-- Email -->
            <div class="mb-3">

              <input type="email"
                     class="form-control"
                     placeholder="Email"
                     formControlName="email">

              <small *ngIf="submitted && f['email'].errors"
                     class="text-danger">
                Valid email required
              </small>

            </div>

            <!-- Phone -->
            <div class="mb-3">

              <input type="text"
                     class="form-control"
                     placeholder="Phone Number"
                     formControlName="phone">

            </div>

            <!-- Password -->
            <div class="mb-3 password-box">

              <input [type]="showPassword ? 'text' : 'password'"
                     class="form-control"
                     placeholder="Password"
                     formControlName="password">

              <span class="toggle" (click)="togglePassword()">👁</span>

              <small *ngIf="submitted && f['password'].errors"
                     class="text-danger">
                Password must be at least 6 characters
              </small>

            </div>

            <!-- Confirm Password -->
            <div class="mb-3 password-box">

              <input [type]="showConfirmPassword ? 'text' : 'password'"
                     class="form-control"
                     placeholder="Confirm Password"
                     formControlName="confirmPassword">

              <span class="toggle"
                    (click)="toggleConfirmPassword()">👁</span>

              <small *ngIf="submitted && f['confirmPassword'].errors"
                     class="text-danger">
                Confirm password is required
              </small>

            </div>

            <!-- Button -->
            <button class="btn btn-primary w-100">
              Register
            </button>

          </form>

          <p class="mt-3 text-center">

            Already have an account?

            <a routerLink="/login">Login</a>

          </p>

        </div>

      </div>

    </div>

  </div>

</section>
